<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder Simple</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="container">
    <section class="panel form-panel">
      <h1>Resume Builder Simple</h1>
      <form id="resume-form">
        <label>
          Full Name
          <input type="text" id="fullName" placeholder="Your name" />
        </label>
        <label>
          Headline
          <input type="text" id="headline" placeholder="Frontend Developer" />
        </label>
        <label>
          Summary
          <textarea id="summary" rows="5" placeholder="Short professional summary"></textarea>
        </label>
        <button type="button" id="load-sample">Load Sample</button>
      </form>
    </section>

    <section class="panel preview-panel">
      <h2>Preview</h2>
      <article id="resume-preview">
        <h3 id="preview-name">Your Name</h3>
        <p id="preview-headline">Your Headline</p>
        <p id="preview-summary">Your summary will appear here.</p>
      </article>
    </section>
  </main>

  <script src="./src/main.js"></script>
</body>
</html>
